<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vetted — Sign In</title>
  <link rel="stylesheet" href="/consumer/static/consumer.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark">V</div>
        <div>
          <div class="login-logo-text">VETTED</div>
          <div class="login-logo-sub">Intelligence Platform</div>
        </div>
      </div>

      {% if error %}
      <div class="error-msg" style="margin-bottom:16px;">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login" class="login-fields">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" class="form-input"
            placeholder="you@firm.com"
            value="{{ email_value | default('') }}"
            required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" class="form-input"
            placeholder="••••••••"
            required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
          Sign in
        </button>
      </form>
      <div style="margin-top:20px;display:flex;justify-content:space-between;font-size:12px;">
        <a href="/forgot" style="color:#888;text-decoration:none;">Forgot password?</a>
        <a href="/signup" style="color:#d97706;text-decoration:none;">Create account →</a>
      </div>
    </div>
  </div>
</body>
</html>
