<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vetted — Create Account</title>
  <link rel="stylesheet" href="/consumer/static/consumer.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark">V</div>
        <div>
          <div class="login-logo-text">VETTED</div>
          <div class="login-logo-sub">Intelligence Platform</div>
        </div>
      </div>

      <h1 style="font-size:18px;font-weight:600;margin:0 0 8px;color:#fff;">Create your account</h1>
      <p style="font-size:13px;color:#888;margin:0 0 20px;line-height:1.5;">
        Free tier: last 30 days, no card. Upgrade any time.
      </p>

      {% if error %}
      <div class="error-msg" style="margin-bottom:16px;">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/signup" class="login-fields">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" class="form-input"
            placeholder="you@firm.com"
            value="{{ email_value | default('') }}"
            required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" class="form-input"
            placeholder="At least 8 characters"
            required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
          Create account
        </button>
      </form>
      <div style="margin-top:20px;font-size:12px;color:#888;text-align:center;">
        Already have one? <a href="/login" style="color:#d97706;text-decoration:none;">Sign in</a>
      </div>
      <div style="margin-top:16px;font-size:11px;color:#666;text-align:center;line-height:1.6;">
        By signing up you agree to our <a href="/legal/terms" style="color:#888;">Terms</a> and <a href="/legal/privacy" style="color:#888;">Privacy Policy</a>.
      </div>
    </div>
  </div>
</body>
</html>
