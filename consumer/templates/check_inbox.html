<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vetted — Check your inbox</title>
  <link rel="stylesheet" href="/consumer/static/consumer.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card" style="text-align:center;">
      <div style="font-size:48px;margin-bottom:16px;">✉️</div>
      <h1 style="font-size:20px;font-weight:600;margin:0 0 12px;color:#fff;">Check your inbox</h1>
      <p style="font-size:14px;color:#bfbfbf;line-height:1.6;margin:0 0 24px;">
        We sent a confirmation link to<br>
        <strong style="color:#fff;">{{ email }}</strong>.<br>
        Click it to activate your account.
      </p>
      <p style="font-size:12px;color:#777;line-height:1.6;">
        Link expires in 24 hours. If it doesn't arrive in a few minutes, check spam.
      </p>
      <a href="/login" style="display:inline-block;margin-top:24px;font-size:13px;color:#d97706;text-decoration:none;">← Back to sign in</a>
    </div>
  </div>
</body>
</html>
